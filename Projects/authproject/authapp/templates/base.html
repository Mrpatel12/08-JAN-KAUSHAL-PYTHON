<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            padding: 30px;
            background: #111;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 5px;
            background: #222;
            color: #fff;
        }

        input:focus {
            outline: 1px solid #fff;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #ccc;
        }

        a {
            color: #fff;
            text-decoration: underline;
        }

        .error {
            color: #ff4d4d;
            font-size: 14px;
        }

        .success {
            color: #00ff99;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
