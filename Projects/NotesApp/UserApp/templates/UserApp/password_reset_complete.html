{% extends 'base.html' %}

{% block content %}
<div class="w-full max-w-md mx-auto py-12 px-4 text-center">
    <div class="bg-white dark:bg-gray-900 rounded-[2.5rem] p-8 md:p-12 shadow-2xl border border-gray-100 dark:border-gray-800 transition-colors">
        <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-8 text-green-600 dark:text-green-400">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h2 class="text-3xl font-black text-gray-900 dark:text-white mb-4">Password Reset!</h2>
        <p class="text-gray-600 dark:text-gray-400 mb-10 leading-relaxed">
            Your password has been successfully reset. You can now log in with your new password.
        </p>
        <a href="{% url 'login' %}" class="block w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl hover:shadow-blue-500/25 transition-all transform hover:-translate-y-1 text-lg">
            Login Now
        </a>
    </div>
</div>
{% endblock %}
