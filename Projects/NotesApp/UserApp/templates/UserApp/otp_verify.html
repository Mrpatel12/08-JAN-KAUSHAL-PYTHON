{% extends 'base.html' %}

{% block content %}
<div class="w-full max-w-md mx-auto py-12 px-4">
    <div class="bg-white dark:bg-gray-900 rounded-[2.5rem] p-8 md:p-12 shadow-2xl border border-gray-100 dark:border-gray-800 transition-colors relative overflow-hidden">
        <!-- Decorative Background -->
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-10 dark:opacity-20"></div>

        <div class="mb-8 text-center">
            <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 rounded-2xl flex items-center justify-center mx-auto mb-6 text-blue-600 dark:text-blue-400">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-3xl font-black text-gray-900 dark:text-white mb-2">Verify Account</h2>
            <p class="text-gray-600 dark:text-gray-400">We've sent a 6-digit code to your email. Please enter it below to continue.</p>
        </div>

        <form method="POST" class="space-y-8">
            {% csrf_token %}
            
            <div class="flex justify-center">
                <input type="text" name="otp" id="otp" maxlength="6" required 
                       class="w-full max-w-[200px] bg-gray-50 dark:bg-gray-800 border-none rounded-2xl px-6 py-5 text-gray-900 dark:text-white placeholder:text-gray-400 focus:ring-4 focus:ring-blue-500/20 transition-all outline-none text-center text-3xl font-black tracking-[1em]">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl hover:shadow-blue-500/25 transition-all transform hover:-translate-y-1 text-lg">
                Verify OTP
            </button>
        </form>

        <div class="mt-10 text-center">
            <p class="text-gray-500 dark:text-gray-400 text-sm">
                Didn't receive the code? 
                <a href="#" class="text-blue-600 dark:text-blue-400 hover:text-blue-500 font-bold transition-colors">Resend OTP</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
