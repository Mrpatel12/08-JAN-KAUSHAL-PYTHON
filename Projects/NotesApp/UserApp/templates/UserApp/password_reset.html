{% extends 'base.html' %}

{% block content %}
<div class="w-full max-w-md mx-auto py-12 px-4">
    <div class="bg-white dark:bg-gray-900 rounded-[2.5rem] p-8 md:p-12 shadow-2xl border border-gray-100 dark:border-gray-800 transition-colors relative overflow-hidden">
        <!-- Decorative Background -->
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-10 dark:opacity-20"></div>

        <div class="mb-8 text-center">
            <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 rounded-2xl flex items-center justify-center mx-auto mb-6 text-blue-600 dark:text-blue-400">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
            </div>
            <h2 class="text-3xl font-black text-gray-900 dark:text-white mb-2">Forgot Password?</h2>
            <p class="text-gray-600 dark:text-gray-400">Enter your email address and we'll send you a link to reset your password.</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-2">
                <label for="id_email" class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">Email Address</label>
                <input type="email" name="email" id="id_email" required placeholder="john@example.com" 
                       class="w-full bg-gray-50 dark:bg-gray-800 border-none rounded-2xl px-6 py-4 text-gray-900 dark:text-white placeholder:text-gray-400 focus:ring-2 focus:ring-blue-500 transition-all outline-none">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl hover:shadow-blue-500/25 transition-all transform hover:-translate-y-1 text-lg">
                Send Reset Link
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="{% url 'login' %}" class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 font-bold transition-colors">
                Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
