{% extends 'base.html' %}

{% block content %}
<div class="w-full max-w-md mx-auto py-12 px-4 transition-all duration-500">
    <!-- Main Card -->
    <div class="bg-white dark:bg-gray-900 rounded-[2.5rem] p-8 md:p-12 shadow-2xl border border-gray-100 dark:border-gray-800 transition-all duration-500 relative overflow-hidden group">
        
        <!-- Animated Background Accents -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-600/10 dark:bg-blue-500/20 rounded-full blur-3xl transition-all duration-700 group-hover:scale-125"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-indigo-600/10 dark:bg-purple-500/20 rounded-full blur-3xl transition-all duration-700 group-hover:scale-125"></div>

        <div class="mb-10 text-center relative z-10">
            <h2 class="text-4xl font-black text-gray-900 dark:text-white mb-3 tracking-tight transition-colors duration-500">
                Welcome Back
            </h2>
            <p class="text-gray-500 dark:text-gray-400 font-medium transition-colors duration-500">
                Access your thoughts securely.
            </p>
        </div>

        <form method="post" class="space-y-6 relative z-10">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label for="email" class="text-xs font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 ml-1">Email Address</label>
                <div class="relative">
                    <input type="email" name="email" id="email" required placeholder="name@example.com" 
                           class="w-full bg-gray-50 dark:bg-gray-800/50 border-2 border-transparent focus:border-blue-500 dark:focus:border-blue-400 rounded-2xl px-6 py-4 text-gray-900 dark:text-white placeholder:text-gray-400 outline-none transition-all duration-300">
                </div>
            </div>
            
            <div class="space-y-2">
                <div class="flex items-center justify-between ml-1">
                    <label for="password" class="text-xs font-black uppercase tracking-widest text-gray-400 dark:text-gray-500">Password</label>
                    <a href="{% url 'password_reset' %}" class="text-xs font-bold text-blue-600 dark:text-blue-400 hover:underline transition-all">Forgot?</a>
                </div>
                <div class="relative">
                    <input type="password" name="password" id="password" required placeholder="••••••••" 
                           class="w-full bg-gray-50 dark:bg-gray-800/50 border-2 border-transparent focus:border-blue-500 dark:focus:border-blue-400 rounded-2xl px-6 py-4 text-gray-900 dark:text-white placeholder:text-gray-400 outline-none transition-all duration-300">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl hover:shadow-blue-500/25 transition-all transform hover:-translate-y-1 active:scale-95 text-lg">
                Sign In
            </button>
        </form>

        <div class="mt-10 text-center relative z-10">
            <p class="text-gray-500 dark:text-gray-400 text-sm font-medium transition-colors duration-500">
                New here? 
                <a href="{% url 'signup' %}" class="text-blue-600 dark:text-blue-400 hover:text-blue-500 font-black transition-colors">Create account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
