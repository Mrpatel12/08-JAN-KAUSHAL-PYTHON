{% extends 'base.html' %}

{% block content %}
<div class="w-full max-w-md mx-auto py-12 px-4 transition-all duration-500">
    <div class="bg-white dark:bg-gray-900 rounded-[2.5rem] p-8 md:p-12 shadow-2xl border border-gray-100 dark:border-gray-800 transition-all duration-500 relative overflow-hidden group">
        
        <!-- Decorative Background Accents -->
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-600/10 dark:bg-blue-500/20 rounded-full blur-3xl transition-all duration-700 group-hover:scale-125"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-purple-600/10 dark:bg-purple-500/20 rounded-full blur-3xl transition-all duration-700 group-hover:scale-125"></div>

        <div class="mb-10 text-center relative z-10">
            <h2 class="text-4xl font-black text-gray-900 dark:text-white mb-3 tracking-tight transition-colors duration-500">
                Join Us
            </h2>
            <p class="text-gray-600 dark:text-gray-400 font-medium transition-colors duration-500">
                Start your productivity journey today.
            </p>
        </div>

        <form method="post" class="space-y-5 relative z-10">
            {% csrf_token %}

            {% for field in form %}
            <div class="space-y-1.5">
                <label for="{{ field.id_for_label }}" class="text-xs font-black uppercase tracking-widest text-gray-400 dark:text-gray-500 ml-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div class="text-red-500 text-xs mt-1 ml-1 flex items-center font-bold">
                    <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    {{ field.errors|striptags }}
                </div>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl hover:shadow-blue-500/25 transition-all transform hover:-translate-y-1 active:scale-95 text-lg mt-6">
                Create Account
            </button>
        </form>

        <div class="mt-10 text-center relative z-10">
            <p class="text-gray-500 dark:text-gray-400 text-sm font-medium transition-colors duration-500">
                Already have an account? 
                <a href="{% url 'login' %}" class="text-blue-600 dark:text-blue-400 hover:text-blue-500 font-black transition-colors">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
