{% extends 'base.html' %}

{% block content %}
<div class="w-full max-w-md mx-auto py-12 px-4 text-center">
    <div class="bg-white dark:bg-gray-900 rounded-[2.5rem] p-8 md:p-12 shadow-2xl border border-gray-100 dark:border-gray-800 transition-colors">
        <div class="w-20 h-20 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mx-auto mb-8 text-green-600 dark:text-green-400">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        </div>
        <h2 class="text-3xl font-black text-gray-900 dark:text-white mb-4">Check Your Email</h2>
        <p class="text-gray-600 dark:text-gray-400 mb-8 leading-relaxed">
            We've sent a password reset link to your email address. If you don't see it, please check your spam folder.
        </p>
        <a href="{% url 'login' %}" class="inline-block bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white font-bold px-8 py-4 rounded-2xl hover:bg-gray-200 dark:hover:bg-gray-700 transition-all">
            Return to Login
        </a>
    </div>
</div>
{% endblock %}
