{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto w-full py-8 px-4">
    <div class="mb-8 flex items-center gap-4">
        <a href="{% url 'admin_user_list' %}" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">{{ title }}</h1>
    </div>

    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-800 p-8">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 dark:text-gray-300">Full Name</label>
                    {{ form.fullname }}
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 dark:text-gray-300">Email Address</label>
                    {{ form.email }}
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 dark:text-gray-300">Mobile Number</label>
                    {{ form.mobile }}
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 dark:text-gray-300">City</label>
                    {{ form.city }}
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-gray-700 dark:text-gray-300">Password</label>
                {{ form.password }}
                <p class="text-xs text-gray-500 dark:text-gray-400">{{ form.password.help_text }}</p>
            </div>

            <div class="flex flex-wrap gap-6 pt-4">
                <div class="flex items-center gap-2">
                    {{ form.is_verified }}
                    <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Is Verified</label>
                </div>
                <div class="flex items-center gap-2">
                    {{ form.is_active }}
                    <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Is Active (Unblocked)</label>
                </div>
            </div>

            <div class="pt-6 flex gap-4">
                <button type="submit" class="flex-grow bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-blue-500/25">
                    Save User Details
                </button>
                <a href="{% url 'admin_user_list' %}" class="px-8 py-3 rounded-xl font-bold text-gray-600 dark:text-gray-400 border border-gray-200 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
