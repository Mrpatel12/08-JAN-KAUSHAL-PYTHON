{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto w-full py-12 px-4">
    <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-800 overflow-hidden">
        <div class="p-8 text-center">
            <div class="w-20 h-20 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Delete Note?</h2>
            <p class="text-gray-600 dark:text-gray-400 mb-8">Are you sure you want to delete the note titled <span class="font-bold text-gray-900 dark:text-white">"{{ note.title }}"</span>? This action cannot be undone.</p>
            
            <form method="POST" class="space-y-3">
                {% csrf_token %}
                <button type="submit" class="w-full bg-red-600 hover:bg-red-500 text-white py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-red-500/25">
                    Yes, Delete Note
                </button>
                <a href="{% url 'admin_note_list' %}" class="block w-full py-3 rounded-xl font-bold text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    No, Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
