{% extends "base.html" %}

{% block title %}Verify OTP | Bookaro{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass reveal active">
        <div class="auth-icon" style="width: 60px; height: 60px; background: rgba(79, 70, 229, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: var(--primary); font-size: 1.5rem;">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h2>Verification Required</h2>
        <p class="subtitle">We've sent a 6-digit code to your email. Please enter it below to continue.</p>

        <form method="POST" id="otp-form">
            {% csrf_token %}
            <div class="form-group" style="text-align: center;">
                <div class="otp-input-container" style="display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 2rem;">
                    <input type="text" name="otp" id="otp" maxlength="6" placeholder="000000" 
                           style="text-align: center; font-size: 2.5rem; letter-spacing: 0.8rem; font-weight: 700; width: 100%; max-width: 300px; background: #F1F5F9; border: 2px solid #E2E8F0; border-radius: 1rem; color: var(--primary);" 
                           required autocomplete="one-time-code" autofocus>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem; height: 55px; font-size: 1.1rem;">
                Verify & Continue
            </button>
        </form>

        <div class="auth-footer" style="margin-top: 2.5rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
            <p id="resend-container">
                Didn't receive the code? 
                <span id="countdown-text" style="color: var(--text-muted);">Resend in <span id="timer">30</span>s</span>
                <a href="{% url 'resend_otp' %}" id="resend-link" style="display: none; color: var(--secondary); font-weight: 600;">Resend Code</a>
            </p>
            <p style="margin-top: 1rem; font-size: 0.85rem;">
                Back to <a href="{% url 'login' %}" style="color: var(--text-muted);">Login</a>
            </p>
        </div>
    </div>
</div>

<script>
    // OTP Countdown Timer
    let timeLeft = 30;
    const timerElement = document.getElementById('timer');
    const countdownText = document.getElementById('countdown-text');
    const resendLink = document.getElementById('resend-link');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            countdownText.style.display = 'none';
            resendLink.style.display = 'inline';
        }
    }, 1000);

    // Auto-focus and clean input
    const otpInput = document.getElementById('otp');
    otpInput.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
    });
</script>

<style>
    .otp-input-container input:focus {
        border-color: var(--primary) !important;
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.1) !important;
        background: white !important;
    }
    
    @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
    }
</style>
{% endblock %}
