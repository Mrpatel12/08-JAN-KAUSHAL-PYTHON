<h2 style="text-align:center;">Showdata</h2>

<div style="text-align:center; margin:10px;">
    <a href="{% url 'adddata' %}" class="btn btn-success">Add New Data</a>
</div>

<table class="table table-bordered text-center" style="width:80%; margin:auto;">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Mobile</th>
        <th>Address</th>
    </tr>

    {% for i in data %}
    <tr>
    <div style="text-align:center; margin:10px;">
    <a href="{% url 'adddata' %}" class="btn btn-success">Add New Data</a>
</div>
        <td>{{ i.id }}</td>
        <td>{{ i.name }}</td>
        <td>{{ i.email }}</td>
        <td>{{ i.mobile }}</td>
        <td>{{ i.address }}</td>
    </tr>
    {% endfor %}
</table>
