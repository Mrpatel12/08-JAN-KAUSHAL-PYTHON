<!DOCTYPE html>
<html>
<head>
    <title>Show Data</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: auto;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
        a {
            text-decoration: none;
            margin: 0 5px;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Showdata</h2>

<table border="1" class="table table-bordered text-center">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Mobile</th>
        <th>Action</th>
    </tr>

    {% for i in data %}
    <tr>
        <td>{{ i.id }}</td>
        <td>{{ i.name }}</td>
        <td>{{ i.email }}</td>
        <td>{{ i.mobile }}</td>
        <td>
            <a href="{% url 'update' i.id %}" class="btn btn-primary btn-sm">Update</a>
            <a href="{% url 'delete' i.id %}" class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
</body>
</html>
